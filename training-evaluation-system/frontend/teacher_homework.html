<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训教学检查评价系统 - 教师作业管理</title>
    <link rel="icon" type="image/png" href="src/logo.png">
    <style>
        :root {
            --bg: #eef2ff;
            --panel: rgba(255,255,255,0.82);
            --panel-strong: #ffffff;
            --border: rgba(0,82,217,0.12);
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0052D9;
            --primary-dark: #003A9B;
            --accent: #52C41A;
            --warning: #FAAD14;
            --danger: #FF4D4F;
            --shadow: 0 20px 60px rgba(0,82,217,0.12);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(79,110,247,0.16),transparent 34%),radial-gradient(circle at top right,rgba(0,184,148,0.10),transparent 26%),linear-gradient(180deg,#f7f9ff 0%,#eef2ff 52%,#edf2f7 100%)}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.32) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.32) 1px,transparent 1px);background-size:72px 72px;pointer-events:none;opacity:0.25}
        a{color:inherit;text-decoration:none}
        .shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh;position:relative;z-index:1}
        .sidebar{position:sticky;top:0;height:100vh;padding:24px 16px;background:linear-gradient(180deg,#121831 0%,#16213e 45%,#0f3460 100%);color:rgba(255,255,255,0.82);border-right:1px solid rgba(255,255,255,0.06);box-shadow:18px 0 45px rgba(15,20,40,0.08);display:flex;flex-direction:column}
        .brand{display:flex;align-items:center;gap:14px;padding:10px 10px 20px;margin-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.08)}
        .brand-mark{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,#4f6ef7,#7c8cff);box-shadow:0 12px 28px rgba(79,110,247,0.34);flex-shrink:0}
        .brand-title{font-size:15px;font-weight:700;letter-spacing:0.5px;line-height:1.35}
        .brand-subtitle{margin-top:4px;font-size:11px;color:rgba(255,255,255,0.56)}
        .sidebar-section{margin-top:8px;flex:1}
        .sidebar-label{padding:10px 12px 8px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.42)}
        .nav-list{display:grid;gap:6px}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;color:rgba(255,255,255,0.76);transition:all 0.22s ease;background:rgba(255,255,255,0.02);border:1px solid transparent;cursor:pointer}
        .nav-item:hover,.nav-item.active{color:#fff;background:rgba(79,110,247,0.18);border-color:rgba(255,255,255,0.08);transform:translateX(4px)}
        .nav-icon{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,0.08);flex-shrink:0}
        .sidebar-footer{padding:16px;border-radius:18px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06)}
        .sidebar-footer p{font-size:12px;line-height:1.7;color:rgba(255,255,255,0.6)}
        .main{padding:24px 28px 40px}
        .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 22px;border-radius:var(--radius-xl);background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border);box-shadow:var(--shadow)}
        .topbar-left{display:flex;flex-direction:column;gap:8px}
        .page-kicker{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--primary-dark);font-weight:700;letter-spacing:1px;text-transform:uppercase}
        .page-title{font-size:26px;font-weight:800;letter-spacing:0.5px}
        .page-desc{color:var(--muted);font-size:14px;line-height:1.7}
        .topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .status-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(0,184,148,0.10);color:var(--accent);font-size:13px;font-weight:600}
        .status-dot{width:8px;height:8px;border-radius:999px;background:currentColor;box-shadow:0 0 0 4px rgba(0,184,148,0.12)}
        .user-chip{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:999px;background:rgba(79,110,247,0.08);border:1px solid rgba(79,110,247,0.12)}
        .avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;background:linear-gradient(135deg,#0052D9,#1890FF);flex-shrink:0}
        .user-meta{display:flex;flex-direction:column;gap:2px}
        .user-name{font-weight:700;font-size:14px}
        .user-role{font-size:12px;color:var(--muted)}
        .logout-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;margin-left:8px;transition:color 0.2s}
        .logout-btn:hover{color:var(--danger)}
        .section{margin-top:24px;scroll-margin-top:24px}
        .section-header{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:16px}
        .section-title{font-size:20px;font-weight:800;letter-spacing:0.2px}
        .section-subtitle{margin-top:6px;color:var(--muted);font-size:13px}
        .section-actions{display:flex;gap:8px;flex-shrink:0}
        .card{background:var(--panel);border:1px solid var(--border);backdrop-filter:blur(16px);border-radius:22px;box-shadow:var(--shadow)}
        .panel{padding:22px}
        .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:14px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:transform 0.22s ease,box-shadow 0.22s ease,background 0.22s ease;font-family:inherit}
        .btn:hover{transform:translateY(-2px)}
        .btn-primary{color:#fff;background:linear-gradient(135deg,#52C41A,#73D13D);box-shadow:0 16px 28px rgba(82,196,26,0.24)}
        .btn-secondary{color:var(--primary);background:rgba(79,110,247,0.08);border:1px solid rgba(79,110,247,0.16)}
        .btn-secondary:hover{background:rgba(79,110,247,0.15)}
        .btn-outline{color:var(--primary);background:rgba(79,110,247,0.08);border:1px solid rgba(79,110,247,0.16)}
        .btn-outline:hover{background:rgba(79,110,247,0.15)}
        .btn-sm{padding:8px 14px;font-size:12px;border-radius:10px}
        .btn-danger{color:#fff;background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 8px 20px rgba(239,68,68,0.25)}
        .btn-cancel{padding:11px 22px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
        .btn-cancel:hover{background:#f8f9fa}
        .btn-submit{padding:11px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#0052D9,#1890FF);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.25s ease}
        .btn-submit:hover{box-shadow:0 8px 24px rgba(79,110,247,0.35);transform:translateY(-1px)}
        .search-box{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;background:var(--panel-strong);border:1px solid var(--border)}
        .search-box input{border:none;outline:none;background:transparent;font-size:13px;color:var(--text);font-family:inherit;width:180px}
        .search-box input::placeholder{color:var(--muted)}
        .tag{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
        .tag.success{background:rgba(0,184,148,0.12);color:var(--accent)}
        .tag.warning{background:rgba(245,158,11,0.12);color:var(--warning)}
        .tag.info{background:rgba(79,110,247,0.12);color:var(--primary)}
        .tag.danger{background:rgba(239,68,68,0.12);color:var(--danger)}
        .tag.neutral{background:rgba(107,114,128,0.12);color:var(--muted)}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:14px 16px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--border)}
        td{padding:14px 16px;font-size:14px;border-bottom:1px solid var(--border)}
        tr:hover td{background:rgba(79,110,247,0.03)}
        .empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
        .empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.4}
        .empty-state p{font-size:14px}
        .loading-spinner{display:flex;align-items:center;justify-content:center;padding:40px}
        .loading-spinner::after{content:'';width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .badge-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;font-weight:700;padding:0 6px}
        .section-hidden{display:none}
        .filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
        .filter-bar select{padding:8px 12px;border-radius:10px;border:1px solid var(--border);font-size:13px;background:#fff;color:var(--text);font-family:inherit;outline:none;cursor:pointer}
        .filter-bar select:focus{border-color:var(--primary)}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .modal-overlay.show{display:flex}
        .modal-box{background:#fff;border-radius:20px;padding:32px 36px;width:560px;max-width:92%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);position:relative;animation:modalIn 0.25s ease}
        @keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-box h3{font-size:20px;font-weight:800;margin-bottom:8px}
        .modal-box .modal-desc{font-size:13px;color:var(--muted);margin-bottom:22px}
        .modal-close-btn{position:absolute;top:16px;right:20px;background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer}
        .form-group{margin-bottom:18px}
        .form-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
        .form-input{width:100%;padding:11px 14px;border:1.5px solid #e9ecef;border-radius:10px;font-size:14px;color:var(--text);background:#f8f9fa;transition:all 0.25s ease;outline:none;font-family:inherit}
        .form-input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(79,110,247,0.08)}
        .form-textarea{min-height:60px;resize:vertical}
        .modal-footer-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
        .toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:grid;gap:10px}
        .toast{padding:14px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.15);display:flex;align-items:center;gap:10px;animation:slideIn 0.3s ease}
        .toast-success{background:linear-gradient(135deg,var(--accent),#00a884)}
        .toast-error{background:linear-gradient(135deg,var(--danger),#dc2626)}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .detail-grid{display:grid;gap:12px}
        .detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8f9fa;border-radius:10px}
        .detail-row .label{font-size:13px;color:var(--muted)}
        .detail-row .value{font-size:14px;font-weight:600}
        .footer-note{margin-top:18px;color:var(--muted);font-size:12px;text-align:center}
        @media(max-width:1200px){.shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid rgba(255,255,255,0.06)}.main{padding-top:18px}.grid-4{grid-template-columns:1fr 1fr}}
        @media(max-width:768px){.main{padding:14px}.panel{padding:18px}.topbar{flex-direction:column;align-items:flex-start}.grid-4{grid-template-columns:1fr}.page-title{font-size:22px}.modal-box{padding:24px}}
    </style>
</head>
<body>
<div class="shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/>
                </svg>
            </div>
            <div>
                <div class="brand-title">教师作业管理</div>
                <div class="brand-subtitle">实训教学检查评价系统</div>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">导航菜单</div>
            <nav class="nav-list">
                <a class="nav-item active" href="#" data-target="courses" onclick="switchTab('courses')">
                    <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg></span>
                    <span>我的课程</span>
                </a>
                <a class="nav-item" href="#" data-target="submissions" onclick="switchTab('submissions')">
                    <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg></span>
                    <span>作业提交 <span class="badge-count" id="sub-badge" style="display:none">0</span></span>
                </a>
            </nav>
        </div>
        <div class="sidebar-footer">
            <p id="sidebar-info">教师：—<br>工号：—</p>
        </div>
    </aside>
    <main class="main">
        <header class="topbar">
            <div class="topbar-left">
                <div class="page-kicker"><span style="width:8px;height:8px;border-radius:50%;background:var(--primary);"></span> TEACHER HOMEWORK</div>
                <div class="page-title" id="page-title">我的班级</div>
                <div class="page-desc" id="page-desc">查看和管理你所教班级的作业提交情况。</div>
            </div>
            <div class="topbar-right">
                <div class="status-pill"><span class="status-dot"></span> 系统运行正常</div>
                <div class="user-chip">
                    <div class="avatar" id="user-avatar">师</div>
                    <div class="user-meta">
                        <div class="user-name" id="user-name">加载中...</div>
                        <div class="user-role" id="user-role-text">教师</div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()" title="退出登录">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- 班级列表 -->
        <div id="tab-courses">
            <section class="section">
                <div class="section-header">
                    <div><div class="section-title">我的课程</div><div class="section-subtitle">你当前授课的课程列表，选择课程查看班级和作业提交情况。</div></div>
                </div>
                <div class="card panel" id="course-list-container"><div class="loading-spinner"></div></div>

                <div id="course-detail-area" style="display:none;margin-top:20px;">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                        <button class="btn btn-outline btn-sm" onclick="showCourseList()">← 返回课程</button>
                        <span style="font-size:15px;font-weight:600;color:var(--text);" id="course-detail-name">—</span>
                    </div>
                    <div id="course-classes-container">
                        <div class="card panel" id="course-classes-list"></div>
                        <div class="card panel" id="course-submissions-area" style="display:none;margin-top:16px;">
                            <div class="section-header" style="border:none;padding:0;margin-bottom:12px;">
                                <div><div class="section-title" style="font-size:16px;" id="cs-class-name">—</div><div class="section-subtitle" id="cs-class-subtitle">学生作业提交情况</div></div>
                            </div>
                            <div id="cs-submissions-list"><div class="loading-spinner"></div></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- 作业提交管理 -->
        <div id="tab-submissions" class="section-hidden">
            <section class="section">
                <div class="section-header">
                    <div><div class="section-title">作业提交管理</div><div class="section-subtitle">查看学生作业，在线预览文件并评分。</div></div>
                </div>
                <div class="filter-bar">
                    <select id="filter-class" onchange="loadSubmissions()"><option value="">全部班级</option></select>
                    <select id="filter-training" onchange="loadSubmissions()"><option value="">全部实训任务</option></select>
                    <select id="filter-status" onchange="loadSubmissions()">
                        <option value="">全部状态</option>
                        <option value="submitted">待评分</option>
                        <option value="evaluated">已评分</option>
                    </select>
                    <button class="btn btn-secondary btn-sm" onclick="loadSubmissions()">刷新</button>
                </div>
                <div class="card panel" id="submission-list-container"><div class="loading-spinner"></div></div>
            </section>
        </div>
        <div class="footer-note">教师作业管理模块 — 支持作业查看、在线预览 PDF/视频、评分评语。</div>
    </main>
</div>

<!-- 评价弹窗 -->
<div class="modal-overlay" id="review-modal">
    <div class="modal-box">
        <button class="modal-close-btn" onclick="closeReviewModal()">&times;</button>
        <h3>批阅作业</h3>
        <div class="modal-desc" id="review-modal-desc">对学生的实训作业进行评分并填写评语。</div>
        <form onsubmit="return false;">
            <div class="form-group">
                <label class="form-label">学生</label>
                <input type="text" class="form-input" id="review-student-name" disabled>
            </div>
            <div class="form-group">
                <label class="form-label">学号</label>
                <input type="text" class="form-input" id="review-student-no" disabled>
            </div>
            <div class="form-group">
                <label class="form-label">实训任务</label>
                <input type="text" class="form-input" id="review-training-title" disabled>
            </div>
            <div class="form-group">
                <label class="form-label">提交时间</label>
                <input type="text" class="form-input" id="review-submit-time" disabled>
            </div>
            <div class="form-group">
                <label class="form-label">文件预览</label>
                <div id="review-file-preview" style="padding:12px;background:#f8f9fa;border-radius:10px;min-height:40px;font-size:13px;color:var(--muted);text-align:center;">加载中...</div>
            </div>
            <div class="form-group">
                <label class="form-label">评分 (0-100)</label>
                <input type="number" class="form-input" id="review-score" min="0" max="100" step="0.5" placeholder="请输入评分">
            </div>
            <div class="form-group">
                <label class="form-label">评语</label>
                <textarea class="form-input form-textarea" id="review-comment" placeholder="请填写评语..."></textarea>
            </div>
            <div class="modal-footer-actions">
                <button type="button" class="btn-cancel" onclick="closeReviewModal()">取消</button>
                <button type="button" class="btn-submit" id="review-submit-btn" onclick="submitReview()">提交评分</button>
            </div>
        </form>
    </div>
</div>

<!-- 已评分详情弹窗 -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal-box" style="width:600px;">
        <button class="modal-close-btn" onclick="closeDetailModal()">&times;</button>
        <h3>评价详情</h3>
        <div class="modal-desc" id="detail-modal-desc">查看已完成评分的详细信息。</div>
        <div id="detail-content"></div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
    let currentUser = null;
    let myClasses = [];
    let submissions = [];

    document.addEventListener('DOMContentLoaded', function() {
        currentUser = loadUser();
        if (!currentUser) { window.location.href = 'login.html'; return; }
        renderUserInfo();
        startSession();
    });

    function loadUser() {
        try { var d = localStorage.getItem('user'); return d ? JSON.parse(d) : null; } catch(e) { return null; }
    }

    function authHeaders(extra) {
        var h = {};
        if (extra) { for (var k in extra) h[k] = extra[k]; }
        if (!currentUser) return h;
        h['X-User-Id'] = currentUser.id;
        h['X-User-Name'] = currentUser.username || '';
        h['X-User-Role'] = currentUser.role || '';
        h['X-User-Type'] = currentUser.account_type || '';
        return h;
    }

    let teacherCourses = [];
    let teacherCourseClasses = [];

    // ========== Tab 切换 ==========
    function switchTab(tab) {
        // 更新导航高亮
        document.querySelectorAll('.nav-item').forEach(function(el) {
            el.classList.toggle('active', el.getAttribute('data-target') === tab);
        });
        // 切换内容区
        var tabId = 'tab-' + tab;
        document.getElementById('tab-courses').style.display = 'none';
        document.getElementById('tab-submissions').classList.add('section-hidden');
        if (tab === 'courses') {
            document.getElementById('tab-courses').style.display = 'block';
            loadTeacherCourses();
        } else {
            document.getElementById('tab-submissions').classList.remove('section-hidden');
            loadSubmissions();
        }
    }

    async function startSession() {
        switchTab('courses');
    }

    function renderUserInfo() {
        var name = currentUser.display_name || '教师';
        var uid = currentUser.username || '—';
        document.getElementById('user-name').textContent = name;
        document.getElementById('user-avatar').textContent = name.charAt(0) || '师';
        document.getElementById('sidebar-info').innerHTML = '教师：' + name + '<br>工号：' + uid;
    }

    // ========== 课程 ==========
    async function loadTeacherCourses() {
        var container = document.getElementById('course-list-container');
        container.innerHTML = '<div class="loading-spinner"></div>';
        document.getElementById('course-detail-area').style.display = 'none';

        try {
            var resp = await fetch('/api/courses/teacher/mine', { headers: authHeaders() });
            var data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || '请求失败');
            teacherCourses = data.courses || [];
            renderCourseList();
        } catch(e) {
            container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载课程失败：' + e.message + '</p></div>';
        }
    }

    function renderCourseList() {
        var container = document.getElementById('course-list-container');
        if (teacherCourses.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>暂无授课课程</p></div>';
            return;
        }
        var h = '<table><thead><tr><th>课程名称</th><th>课程代码</th><th>学期</th><th>授课教师</th><th>班级数</th><th>操作</th></tr></thead><tbody>';
        teacherCourses.forEach(function(c) {
            h += '<tr><td><strong>' + (c.course_name || '') + '</strong></td><td>' + (c.course_code || '—') + '</td><td>' + (c.semester || '—') + '</td><td>' + (c.teacher_name || '—') + '</td><td>' + (c.class_count || 0) + '</td>' +
                '<td><button class="btn btn-outline btn-sm" onclick="viewCourseDetail(' + c.id + ', \'' + escapeStr(c.course_name) + '\')">查看班级</button></td></tr>';
        });
        h += '</tbody></table>';
        container.innerHTML = h;
    }

    function escapeStr(s) {
        if (!s) return '';
        return s.replace(/\'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function viewCourseDetail(courseId, courseName) {
        document.getElementById('course-detail-name').textContent = courseName || ('课程 #' + courseId);
        document.getElementById('course-detail-area').style.display = 'block';
        document.getElementById('course-classes-list').innerHTML = '<div class="loading-spinner"></div>';
        document.getElementById('course-submissions-area').style.display = 'none';

        try {
            var resp = await fetch('/api/courses/teacher/' + courseId + '/classes', { headers: authHeaders() });
            var data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || '请求失败');
            teacherCourseClasses = data.classes || [];
            renderCourseClasses(courseId);
        } catch(e) {
            document.getElementById('course-classes-list').innerHTML = '<div class="empty-state" style="padding:20px"><div class="icon">⚠️</div><p>' + e.message + '</p></div>';
        }
    }

    function renderCourseClasses(courseId) {
        var container = document.getElementById('course-classes-list');
        if (teacherCourseClasses.length === 0) {
            container.innerHTML = '<div class="empty-state" style="padding:20px"><div class="icon">🏫</div><p>该课程暂无班级</p></div>';
            return;
        }
        var h = '<table><thead><tr><th>班级名称</th><th>班级编号</th><th>专业</th><th>年级</th><th>学生人数</th><th>操作</th></tr></thead><tbody>';
        teacherCourseClasses.forEach(function(cls) {
            h += '<tr><td><strong>' + cls.class_name + '</strong></td><td>' + (cls.class_code || '—') + '</td><td>' + (cls.major || '—') + '</td><td>' + (cls.grade || '—') + '</td><td>' + (cls.student_count || 0) + '</td>' +
                '<td><button class="btn btn-primary btn-sm" onclick="viewClassSubmissions(' + courseId + ',' + cls.id + ', \'' + escapeStr(cls.class_name) + '\')">查看作业</button></td></tr>';
        });
        h += '</tbody></table>';
        container.innerHTML = h;
    }

    function showCourseList() {
        document.getElementById('course-detail-area').style.display = 'none';
        renderCourseList();
    }

    async function viewClassSubmissions(courseId, classId, className) {
        document.getElementById('cs-class-name').textContent = className || ('班级 #' + classId);
        document.getElementById('cs-class-subtitle').textContent = '课程 ID: ' + courseId + ' 的作业提交情况';
        document.getElementById('course-submissions-area').style.display = 'block';

        var listEl = document.getElementById('cs-submissions-list');
        listEl.innerHTML = '<div class="loading-spinner"></div>';

        try {
            // 获取该班级所有实训的作业
            var resp = await fetch('/api/homework/teacher/submissions?class_id=' + classId + '&training_id=0',
                { headers: authHeaders() });
            var data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || '请求失败');

            var subs = data.submissions || [];
            if (subs.length === 0) {
                listEl.innerHTML = '<div class="empty-state" style="padding:20px"><div class="icon">📋</div><p>该班级暂无作业提交</p></div>';
                return;
            }
            renderClassSubmissionsTable(listEl, subs);
        } catch(e) {
            listEl.innerHTML = '<div class="empty-state" style="padding:20px"><div class="icon">⚠️</div><p>加载失败：' + e.message + '</p></div>';
        }
    }

    function renderClassSubmissionsTable(container, subs) {
        var h = '<table><thead><tr><th>学生</th><th>学号</th><th>实训任务</th><th>文件名</th><th>提交时间</th><th>状态</th><th>分数</th><th>操作</th></tr></thead><tbody>';
        subs.forEach(function(s) {
            var statusLabel = s.status === 'evaluated' ? '已评分' : '待评分';
            var statusClass = s.status === 'evaluated' ? 'tag success' : 'tag warning';
            var scoreDisplay = s.teacher_score != null ? s.teacher_score : '—';
            h += '<tr>' +
                '<td>' + (s.student_name || '—') + '</td>' +
                '<td>' + (s.student_no || '—') + '</td>' +
                '<td>' + (s.training_title || '—') + '</td>' +
                '<td>' + (s.file_original_name || '—') + '</td>' +
                '<td>' + (s.submitted_at || '—') + '</td>' +
                '<td><span class="' + statusClass + '">' + statusLabel + '</span></td>' +
                '<td><strong>' + scoreDisplay + '</strong></td>' +
                '<td><button class="btn btn-outline btn-sm" onclick="openReviewModal(' + s.id + ')">批阅</button></td>' +
                '</tr>';
        });
        h += '</tbody></table>';
        container.innerHTML = h;
    }

    function openReviewModal(submissionId) {
        // ... existing review modal functionality stays the same
        // We reference the existing review flow from homework tab
        // For now, switch to submissions tab and trigger filter
        document.getElementById('filter-class').value = '';
        switchTab('submissions');
        setTimeout(function() {
            // find and highlight
            showToast('请在作业提交管理面板中查找并批阅该作业', 'info');
        }, 500);
    }

    // ========== 提交记录 ==========
    async function loadSubmissions() {
        var c = document.getElementById('submission-list-container');
        c.innerHTML = '<div class="loading-spinner"></div>';

        var classId = document.getElementById('filter-class') ? document.getElementById('filter-class').value : '';
        var trainingId = document.getElementById('filter-training') ? document.getElementById('filter-training').value : '';
        var statusFilter = document.getElementById('filter-status') ? document.getElementById('filter-status').value : '';

        var url = '/api/homework/teacher/submissions';
        var params = [];
        if (classId) params.push('class_id=' + classId);
        if (trainingId) params.push('training_id=' + trainingId);
        if (params.length) url += '?' + params.join('&');

        try {
            var resp = await fetch(url, { headers: authHeaders() });
            var data = await resp.json();
            submissions = Array.isArray(data.submissions) ? data.submissions : [];

            // 状态过滤（前端）
            if (statusFilter) {
                submissions = submissions.filter(function(s) { return s.status === statusFilter; });
            }

            // 更新课序号下拉
            populateFilters();
            updateBadge();

            renderSubmissions();
        } catch(e) {
            c.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>加载失败：' + (e.message || '未知错误') + '</p></div>';
        }
    }

    function populateFilters() {
        var clsSelect = document.getElementById('filter-class');
        var curVal = clsSelect.value;
        clsSelect.innerHTML = '<option value="">全部班级</option>';
        var added = {};
        submissions.forEach(function(s) {
            var key = s.class_id;
            if (!added[key]) {
                added[key] = true;
                clsSelect.innerHTML += '<option value="' + key + '">' + (s.class_name || '班级#' + key) + '</option>';
            }
        });
        if (curVal) clsSelect.value = curVal;

        var trnSelect = document.getElementById('filter-training');
        var curTrn = trnSelect.value;
        trnSelect.innerHTML = '<option value="">全部实训任务</option>';
        var addedTrn = {};
        submissions.forEach(function(s) {
            var key = s.training_id;
            if (!addedTrn[key]) {
                addedTrn[key] = true;
                trnSelect.innerHTML += '<option value="' + key + '">' + (s.training_title || '实训#' + key) + '</option>';
            }
        });
        if (curTrn) trnSelect.value = curTrn;
    }

    function updateBadge() {
        var pending = submissions.filter(function(s) { return s.status === 'submitted'; }).length;
        var badge = document.getElementById('sub-badge');
        if (pending > 0) { badge.style.display = 'inline-flex'; badge.textContent = pending; }
        else { badge.style.display = 'none'; }
    }

    function renderSubmissions() {
        var c = document.getElementById('submission-list-container');
        if (submissions.length === 0) {
            c.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无作业提交记录</p></div>';
            return;
        }
        var h = '<table><thead><tr><th>学生</th><th>学号</th><th>班级</th><th>实训任务</th><th>文件</th><th>提交时间</th><th>状态</th><th>评分</th><th>操作</th></tr></thead><tbody>';
        submissions.forEach(function(s) {
            var statusTag = s.status === 'evaluated' ? '<span class="tag success">已评分</span>' : '<span class="tag warning">待评分</span>';
            var scoreDisplay = s.teacher_score != null ? s.teacher_score.toFixed(1) + ' 分' : '—';
            var fileName = s.file_original_name || '—';
            var ext = (s.file_extension || '').toLowerCase();
            var canPreview = ext === '.pdf' || ext === '.mp4';

            h += '<tr>' +
                '<td><strong>' + (s.student_name || '—') + '</strong></td>' +
                '<td>' + (s.student_no || '—') + '</td>' +
                '<td>' + (s.class_name || '—') + '</td>' +
                '<td>' + (s.training_title || '实训#' + s.training_id) + '</td>' +
                '<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + fileName + '">' +
                    fileName +
                    (canPreview ? ' <a href="#" onclick="previewFile(' + s.id + ');return false;" style="color:var(--primary);font-size:12px;">预览</a>' : ' ' +
                    '<a href="/api/homework/file/' + s.id + '" target="_blank" style="color:var(--primary);font-size:12px;">下载</a>') +
                '</td>' +
                '<td style="font-size:13px;color:var(--muted)">' + (s.submitted_at || '—') + '</td>' +
                '<td>' + statusTag + '</td>' +
                '<td>' + scoreDisplay + '</td>' +
                '<td>' +
                    (s.status === 'evaluated'
                        ? '<button class="btn btn-outline btn-sm" onclick="viewDetail(' + s.id + ')">详情</button>'
                        : '<button class="btn btn-primary btn-sm" onclick="openReview(' + s.id + ')">批阅</button>') +
                '</td></tr>';
        });
        h += '</tbody></table>';
        c.innerHTML = h;
    }

    // ========== 文件预览 ==========
    function previewFile(workId) {
        var w = window.open('', '_blank');
        w.document.write('<html><head><meta charset="utf-8"><title>作业预览</title></head><body style="margin:0;padding:0;background:#f5f5f5;">');
        // 从submissions找文件信息
        var s = submissions.find(function(x) { return x.id === workId; });
        if (!s) { w.document.write('<p style="padding:40px;text-align:center;color:#999;">文件信息不存在</p>'); w.document.close(); return; }
        var ext = (s.file_extension || '').toLowerCase();
        var fileUrl = '/api/homework/file/' + workId;
        if (ext === '.pdf') {
            w.document.write('<embed src="' + fileUrl + '" type="application/pdf" width="100%" height="100%" style="position:absolute;inset:0;">');
        } else if (ext === '.mp4') {
            w.document.write('<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><video controls width="90%" style="max-width:1000px;" src="' + fileUrl + '"></video></div>');
        } else {
            w.document.write('<p style="padding:40px;text-align:center;">该文件类型不支持在线预览，<a href="' + fileUrl + '">点击下载</a></p>');
        }
        w.document.close();
    }

    // ========== 评分 ==========
    let currentReviewId = null;

    function openReview(workId) {
        currentReviewId = workId;
        var s = submissions.find(function(x) { return x.id === workId; });
        if (!s) { showToast('作业信息未找到', 'error'); return; }
        document.getElementById('review-student-name').value = s.student_name || '—';
        document.getElementById('review-student-no').value = s.student_no || '—';
        document.getElementById('review-training-title').value = s.training_title || '实训#' + s.training_id;
        document.getElementById('review-submit-time').value = s.submitted_at || '—';
        document.getElementById('review-score').value = '';
        document.getElementById('review-comment').value = '';
        document.getElementById('review-submit-btn').disabled = false;
        document.getElementById('review-submit-btn').textContent = '提交评分';

        // 文件预览
        var previewDiv = document.getElementById('review-file-preview');
        var ext = (s.file_extension || '').toLowerCase();
        var fileName = s.file_original_name || '—';
        var fileUrl = '/api/homework/file/' + workId;
        if (ext === '.pdf') {
            previewDiv.innerHTML = '<embed src="' + fileUrl + '" type="application/pdf" width="100%" height="400px" style="border-radius:8px;">';
        } else if (ext === '.mp4') {
            previewDiv.innerHTML = '<video controls width="100%" src="' + fileUrl + '" style="border-radius:8px;max-height:300px;"></video>';
        } else {
            previewDiv.innerHTML = '<div style="display:flex;align-items:center;gap:10px;">📄 ' + fileName +
                ' <a href="' + fileUrl + '" target="_blank" class="btn btn-outline btn-sm">下载查看</a></div>';
        }

        document.getElementById('review-modal').classList.add('show');
    }

    function closeReviewModal() {
        document.getElementById('review-modal').classList.remove('show');
        currentReviewId = null;
    }

    async function submitReview() {
        var score = document.getElementById('review-score').value.trim();
        var comment = document.getElementById('review-comment').value.trim();

        if (!score) { showToast('请输入评分', 'error'); return; }
        score = parseFloat(score);
        if (isNaN(score) || score < 0 || score > 100) { showToast('评分必须在0-100之间', 'error'); return; }

        var btn = document.getElementById('review-submit-btn');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            var resp = await fetch('/api/homework/review/' + currentReviewId, {
                method: 'PUT',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ teacher_score: score, teacher_comment: comment })
            });
            var data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || '评分失败');
            showToast('评分成功！', 'success');
            closeReviewModal();
            await loadSubmissions();
        } catch(e) {
            showToast(e.message, 'error');
            btn.disabled = false;
            btn.textContent = '提交评分';
        }
    }

    // ========== 详情查看 ==========
    function viewDetail(workId) {
        var s = submissions.find(function(x) { return x.id === workId; });
        if (!s) { showToast('作业信息未找到', 'error'); return; }
        var content = '<div class="detail-grid">' +
            '<div class="detail-row"><span class="label">学生姓名</span><span class="value">' + (s.student_name || '—') + '</span></div>' +
            '<div class="detail-row"><span class="label">学号</span><span class="value">' + (s.student_no || '—') + '</span></div>' +
            '<div class="detail-row"><span class="label">班级</span><span class="value">' + (s.class_name || '—') + '</span></div>' +
            '<div class="detail-row"><span class="label">实训任务</span><span class="value">' + (s.training_title || '实训#' + s.training_id) + '</span></div>' +
            '<div class="detail-row"><span class="label">提交时间</span><span class="value">' + (s.submitted_at || '—') + '</span></div>' +
            '<div class="detail-row"><span class="label">文件</span><span class="value">' + (s.file_original_name || '—') + '</span></div>' +
            '<div class="detail-row"><span class="label">评分</span><span class="value">' + (s.teacher_score != null ? s.teacher_score.toFixed(1) + ' 分' : '—') + '</span></div>' +
            '<div class="detail-row"><span class="label">评阅时间</span><span class="value">' + (s.reviewed_at || '—') + '</span></div>' +
            '</div>';
        if (s.teacher_comment) {
            content += '<div style="margin-top:14px;padding:14px;background:#f0f4ff;border-radius:10px;font-size:13px;line-height:1.8;">' +
                '<strong style="display:block;margin-bottom:6px;">评语</strong>' + s.teacher_comment + '</div>';
        }
        // 文件预览链接
        var ext = (s.file_extension || '').toLowerCase();
        if (ext === '.pdf' || ext === '.mp4') {
            content += '<div style="margin-top:14px;"><a href="#" onclick="window.open(\'/api/homework/file/' + s.id + '\',\'_blank\');return false;" class="btn btn-secondary btn-sm">📄 在线预览文件</a></div>';
        } else {
            content += '<div style="margin-top:14px;"><a href="/api/homework/file/' + s.id + '" target="_blank" class="btn btn-secondary btn-sm">📥 下载文件</a></div>';
        }

        document.getElementById('detail-modal-desc').textContent = '查看作业评分详情。';
        document.getElementById('detail-content').innerHTML = content;
        document.getElementById('detail-modal').classList.add('show');
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.remove('show'); }

    // ========== Toast ==========
    function showToast(message, type) {
        type = type || 'success';
        var container = document.getElementById('toast-container');
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.innerHTML = '<span>' + (type === 'success' ? '&#10003;' : '&#10007;') + '</span><span>' + message + '</span>';
        container.appendChild(toast);
        setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3500);
    }

    function handleLogout() {
        localStorage.removeItem('user');
        localStorage.removeItem('student_extra');
        window.location.href = 'login.html';
    }

    // 点击遮罩关闭
    document.addEventListener('click', function(e) {
        if (e.target === document.getElementById('review-modal')) closeReviewModal();
        if (e.target === document.getElementById('detail-modal')) closeDetailModal();
    });
</script>
</body>
</html>
