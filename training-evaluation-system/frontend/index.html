<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训教学检查评价系统-首页</title>
    <link rel="icon" type="image/png" href="src/logo.png">
    <link rel="stylesheet" href="style.css?v=40">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 顶部全局导航栏 -->
        <header class="top-header">
            <div class="top-header-main">
                <!-- 左侧：Logo + 标题 + 工作台信息 -->
                <div class="top-header-left">
                    <a href="#dashboard" class="brand" onclick="router.navigate('dashboard')">
                        <div class="brand-icon">
                            <img src="src/logo.png" alt="智训评" class="brand-img">
                        </div>
                        <h1 class="brand-title">实训管理平台</h1>
                    </a>
                    <div class="header-workbench" id="header-workbench">
                        <span class="header-time" id="header-time">--:--</span>
                        <span class="header-divider">|</span>
                        <span class="header-date" id="header-date">----年--月--日 星期-</span>
                        <span class="header-divider">|</span>
                        <span class="header-week-pill" id="header-week">
                            <span class="pill-text">--</span>
                            <svg class="pill-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- 右侧：消息/帮助/反馈 + 用户 -->
                <div class="top-header-right">
                    <button class="header-icon-btn" title="消息">
                        <span class="header-icon-wrap">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                            </svg>
                            <span class="header-badge" id="message-badge" style="display:none"></span>
                        </span>
                        <span class="header-icon-label">消息</span>
                    </button>
                    <button class="header-icon-btn" title="帮助">
                        <span class="header-icon-wrap">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                                <line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                        </span>
                        <span class="header-icon-label">帮助</span>
                    </button>
                    <button class="header-icon-btn" title="反馈">
                        <span class="header-icon-wrap">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM5 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H5z"/>
                            </svg>
                        </span>
                        <span class="header-icon-label">反馈</span>
                    </button>
                    <div class="user-menu">
                        <span class="user-name" id="user-display-name">管理员</span>
                        <div class="user-avatar" id="user-avatar-letter">管</div>
                    </div>
                </div>
            </div>

            <!-- 二级横向菜单 -->
            <nav class="top-nav">
                <a href="#dashboard" class="top-nav-item active" onclick="router.navigate('dashboard')">
                    <span>首页</span>
                </a>
                <a href="#training" class="top-nav-item" onclick="router.navigate('training')">
                    <span>实训管理</span>
                </a>
                <a href="#evaluation" class="top-nav-item" onclick="router.navigate('evaluation')">
                    <span>评价规则配置</span>
                </a>
                <a href="#report" class="top-nav-item" onclick="router.navigate('report')">
                    <span>AI评阅报告</span>
                </a>
                <a href="#growth" class="top-nav-item" onclick="router.navigate('growth')">
                    <span>学生成长分析</span>
                </a>

            </nav>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <div id="page-content" class="page-content"></div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-backdrop" class="modal-backdrop" style="display:none"></div>
    <div id="modal-container" class="modal-container" style="display:none"></div>

    <script src="app.js?v=41"></script>
</body>
</html>
